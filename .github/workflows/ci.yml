name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24']
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Build
        run: go build -v ./...
      
      - name: Test
        run: go test -v -race -count=1 ./...
      
      - name: Build CLI
        run: go build -o tmplx ./cmd/tmplx
      
      - name: Smoke test CLI
        run: |
          ./tmplx eval 'Hello {{ name | upper }}!' --json '{"name": "world"}'
          ./tmplx filters | head -5
          ./tmplx version
